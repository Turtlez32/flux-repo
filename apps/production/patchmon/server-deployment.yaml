apiVersion: apps/v1
kind: Deployment
metadata:
  name: patchmon-server
  namespace: patchmon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patchmon-server
  template:
    metadata:
      labels:
        app: patchmon-server
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: node-role.kubernetes.io/master
                    operator: DoesNotExist
      containers:
        - name: server
          image: ghcr.io/patchmon/patchmon-server:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: patchmon-env
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
